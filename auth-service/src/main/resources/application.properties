spring.application.name=auth-service

# Railway injects PORT automatically
server.port=${PORT:8082}

# ── DATABASE ──────────────────────────────────────────────────────────────────
# Railway MySQL gives JDBC URL directly via MYSQL_PUBLIC_URL
# Format: jdbc:mysql://host:port/dbname?params
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/auth_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── EUREKA ────────────────────────────────────────────────────────────────────
eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${RAILWAY_PRIVATE_DOMAIN:localhost}

# ── OAUTH2 GOOGLE ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=profile,email
# Railway public URL of this auth-service for the callback
spring.security.oauth2.client.registration.google.redirect-uri=${AUTH_SERVICE_URL:http://localhost:8082}/login/oauth2/code/google

# ── FRONTEND URL (for OAuth redirect back to frontend) ────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── SWAGGER ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
